<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Kalm AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0514 0%, #1a0033 100%);
            color: #e0d0ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: rgba(20, 10, 40, 0.95);
            padding: 12px 20px;
            border-bottom: 1px solid #4b0082;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header h1 { font-size: 18px; color: #da70d6; display: flex; align-items: center; gap: 8px; }
        .tabs { display: flex; gap: 10px; margin-left: auto; }
        .tab-btn {
            background: rgba(75, 0, 130, 0.3);
            border: 1px solid #4b0082;
            color: #d8bfd8;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .tab-btn.active { background: #6a0dad; color: #fff; border-color: #8a2be2; }
        .tab-btn:hover:not(.active) { background: rgba(75, 0, 130, 0.6); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        .panel { display: none; flex-direction: column; height: 100%; }
        .panel.active { display: flex; }
        
        .input-area { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-area input, .input-area select {
            background: rgba(10, 5, 20, 0.8);
            border: 1px solid #4b0082;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .input-area input { flex: 1; }
        .input-area select { width: 150px; }
        .btn-primary {
            background: linear-gradient(135deg, #6a0dad, #8a2be2);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.1s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .output-area {
            flex: 1;
            background: rgba(10, 5, 20, 0.6);
            border: 1px solid #4b0082;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .output-area h2 { color: #da70d6; margin: 15px 0 10px 0; font-size: 16px; }
        .output-area h3 { color: #9370db; margin: 12px 0 8px 0; font-size: 15px; }
        .loading { color: #ffaa00; font-style: italic; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Kalm AI</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchPanel('chat', this)">💬 Chat Académico</button>
            <button class="tab-btn" onclick="switchPanel('corp', this)">🏢 Kroot Corp</button>
        </div>
    </div>

    <div class="main-content">
        <div id="panel-chat" class="panel active">
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Escribe un tema o pregunta y pulsa Generar...">
                <select id="chat-model">
                    <option value="openai">OpenAI</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="llama">Llama</option>
                </select>
                <button class="btn-primary" onclick="generateContent('chat')">📝 Generar</button>
            </div>
            <div id="chat-output" class="output-area">
                <span style="color:#9370db">💡 Escribe un tema y pulsa "Generar" para crear un trabajo académico o resolver dudas.</span>
            </div>
        </div>

        <div id="panel-corp" class="panel">
            <div class="input-area">
                <input type="text" id="corp-input" placeholder="Describe el informe ejecutivo que necesitas...">
                <select id="corp-model">
                    <option value="openai">OpenAI</option>
                    <option value="claude">Claude</option>
                </select>
                <button class="btn-primary" onclick="generateContent('corp')">📊 Generar Informe</button>
            </div>
            <div id="corp-output" class="output-area">
                <span style="color:#9370db">💡 Genera informes ejecutivos profesionales orientados a la toma de decisiones.</span>
            </div>
        </div>
    </div>

    <script>
        function switchPanel(panel, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${panel}`).classList.add('active');
            btn.classList.add('active');
        }

        async function generateContent(type) {
            const input = document.getElementById(`${type}-input`);
            const model = document.getElementById(`${type}-model`).value;
            const output = document.getElementById(`${type}-output`);
            const tema = input.value.trim();
            
            if (!tema) {
                output.innerHTML = '<span class="error">❌ Por favor, escribe un tema o pregunta.</span>';
                return;
            }
            
            output.innerHTML = '<span class="loading">⏳ Generando respuesta con IA... (esto puede tardar unos segundos)</span>';
            
            try {
                const endpoint = type === 'chat' ? '/api/kalm/chat' : '/api/kalm/generar';
                const payload = type === 'chat' 
                    ? { mensaje: tema, modelo: model }
                    : { tema: tema, modelo: model, tipo: 'chat' };
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (data.resultado || data.respuesta) {
                    const text = data.resultado || data.respuesta;
                    const formatted = text
                        .replace(/##\s+(.*)/g, '<h2>$1</h2>')
                        .replace(/###\s+(.*)/g, '<h3>$1</h3>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
                    output.innerHTML = formatted;
                } else if (data.error) {
                    output.innerHTML = `<span class="error">❌ Error: ${data.error}</span>`;
                } else {
                    output.innerHTML = '<span class="error">❌ Respuesta no válida del servidor.</span>';
                }
            } catch (error) {
                output.innerHTML = `<span class="error">❌ Error de conexión: ${error.message}</span>`;
            }
        }

        document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') generateContent('chat'); });
        document.getElementById('corp-input').addEventListener('keydown', e => { if (e.key === 'Enter') generateContent('corp'); });
    </script>
</body>
</html>
