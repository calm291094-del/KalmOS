<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalm OS v4.0 - Login</title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🏰</div>
            <h1>KALM OS</h1>
            <p>v4.0 - Dark Fantasy Edition</p>
            <p class="subtitle">Tensei Shitara Slime Datta Ken × Overlord</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label>👤 Usuario</label>
                <input type="text" id="username" required autocomplete="off" autofocus>
            </div>
            <div class="form-group">
                <label>🔒 Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-btn">⚔️ Iniciar Sesión</button>
            <div id="error-msg" class="error-msg"></div>
        </form>
        <div class="footer">
            <p>Mini OS + Virtual Server Environment</p>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async e => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            try {
                const r = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const d = await r.json();
                if (d.ok) {
                    document.cookie = `session_id=${d.session_id}; path=/; max-age=3600`;
                    window.location.href = '/desktop';
                } else {
                    err.textContent = d.error || 'Credenciales incorrectas';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.textContent = 'Error de conexión';
                err.style.display = 'block';
            }
        });
    </script>
</body>
</html>
